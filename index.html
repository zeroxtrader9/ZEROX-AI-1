<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROX QUANTUM AI | ULTRA TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --up: #00ff88; --down: #ff3131; --bg: #010409; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid #30363d; }
        .vip-lock { display: none; position: fixed; inset: 0; background: rgba(1, 4, 9, 0.98); z-index: 9999; }
        select { background-color: #000; color: #00f2ff; border: 1px solid #333; padding: 12px; border-radius: 15px; width: 100%; font-weight: bold; outline: none; cursor: pointer; }
    </style>
</head>
<body class="p-2 lg:p-4">

<div id="vip-lock" class="flex-col items-center justify-center p-6 text-center">
    <div class="glass p-10 rounded-[40px] border-2 border-yellow-500 max-w-lg shadow-[0_0_50px_rgba(234,179,8,0.2)]">
        <h2 class="text-4xl font-black text-yellow-500 mb-4 italic uppercase">Trial Expired</h2>
        <div id="pay-content" class="space-y-6"></div>
        <button onclick="window.open('https://t.me/your_handle')" class="mt-8 w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-yellow-500 transition-all uppercase tracking-widest">Connect with Admin</button>
    </div>
</div>

<div class="flex justify-between items-center mb-4 glass p-4 rounded-2xl border-cyan-900/30">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center font-black text-black text-xl shadow-[0_0_20px_rgba(6,182,212,0.4)]">Q</div>
        <h1 class="text-xl font-black tracking-tighter uppercase">ZEROX <span class="text-cyan-400">QUANTUM</span></h1>
    </div>
    <div id="trial-clock" class="text-yellow-500 font-mono font-bold bg-yellow-500/10 px-4 py-2 rounded-xl border border-yellow-500/20">TRIAL: 60:00</div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
    <div class="lg:col-span-1 space-y-4">
        <div class="glass p-6 rounded-[32px] text-center border-gray-800" id="signal-box">
            <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block tracking-widest text-left ml-2">Select Global Market</label>
            <select id="market-select" onchange="changeMarket()">
                <optgroup label="🔥 MOST POPULAR">
                    <option value="FX:EURUSD">EUR / USD (Euro Dollar)</option>
                    <option value="FX:GBPUSD">GBP / USD (Pound Dollar)</option>
                    <option value="OANDA:XAUUSD">XAU / USD (Gold)</option>
                    <option value="BITSTAMP:BTCUSD">BITCOIN (BTC)</option>
                </optgroup>
                <optgroup label="💱 FOREX MAJORS">
                    <option value="FX:USDJPY">USD / JPY</option>
                    <option value="FX:AUDUSD">AUD / USD</option>
                    <option value="FX:USDCAD">USD / CAD</option>
                    <option value="FX:USDCHF">USD / CHF</option>
                    <option value="FX:NZDUSD">NZD / USD</option>
                </optgroup>
                <optgroup label="📊 CROSS PAIRS">
                    <option value="FX:EURGBP">EUR / GBP</option>
                    <option value="FX:EURJPY">EUR / JPY</option>
                    <option value="FX:GBPJPY">GBP / JPY</option>
                    <option value="FX:EURAUD">EUR / AUD</option>
                    <option value="FX:AUDJPY">AUD / JPY</option>
                </optgroup>
                <optgroup label="🚀 CRYPTO & INDICES">
                    <option value="BITSTAMP:ETHUSD">ETHEREUM (ETH)</option>
                    <option value="BINANCE:SOLUSD">SOLANA (SOL)</option>
                    <option value="CURRENCYCOM:US100">NASDAQ 100</option>
                    <option value="CURRENCYCOM:US30">DOW JONES 30</option>
                </optgroup>
            </select>
            
            <div id="timer" class="text-7xl font-black text-white mt-4 mb-2 tracking-tighter">00:60</div>
            <div id="signal-text" class="py-5 rounded-2xl bg-gray-900 border border-gray-800 text-2xl font-black tracking-widest uppercase mb-3 text-gray-600">Syncing AI...</div>
            <div id="reasoning" class="text-[10px] text-gray-400 italic bg-black/40 py-2 rounded-lg min-h-[40px] flex items-center justify-center">Analyzing Market Confluence...</div>
        </div>

        <a href="https://u3.shortink.io/register?utm_campaign=833654&utm_source=affiliate&utm_medium=sr&a=KT4gRQABJ5uWXs&ac=kprajput&code=VQK088" 
           target="_blank" class="block bg-yellow-500 text-black text-center py-4 rounded-2xl font-black text-xs hover:scale-[1.02] transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)]">
           REGISTER ON OFFICIAL BROKER
        </a>
    </div>

    <div class="lg:col-span-3 h-[75vh] glass rounded-[32px] overflow-hidden border-gray-800 shadow-2xl">
        <div id="tradingview_widget" class="h-full w-full"></div>
    </div>
</div>

<div class="mt-4 glass p-4 rounded-2xl text-[10px] flex justify-between items-center border-gray-800">
    <div id="status-log" class="text-gray-500 font-mono italic uppercase tracking-widest">● All Systems Nominal...</div>
    <button id="activate" class="bg-cyan-500 text-black px-10 py-3 rounded-full font-black uppercase tracking-tighter hover:bg-white transition-all shadow-lg shadow-cyan-500/20">Initialize AI Engine</button>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let trialSecs = 3600;
    let voiceActive = false;
    const synth = window.speechSynthesis;

    function loadChart(symbol) {
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "1", "theme": "dark", "container_id": "tradingview_widget", "style": "1",
            "studies": ["RSI@tv-basicstudies", "EMA@tv-basicstudies", "MACD@tv-basicstudies"]
        });
    }
    loadChart("FX:EURUSD");

    function changeMarket() { 
        const sym = document.getElementById('market-select').value;
        loadChart(sym); 
        document.getElementById('status-log').innerText = `● SYMBOL CHANGED: ${sym} LOADING...`;
    }

    async function setupPayment() {
        const usdt = "THPV3WTBg8jKKZcbqXUjgNhPpficWP6UXi";
        const upi = "YOUR_UPI_ID_HERE"; // <--- Bhai, apna UPI yahan zaroor likhna
        const r = await fetch('https://ipapi.co/json/');
        const d = await r.json();
        
        const content = (d.country_code === 'IN') ? 
            `<p class='text-green-400 font-black text-3xl'>₹2,499</p><img class='mx-auto border-4 border-white rounded-2xl' src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=${upi}'/><p class='text-xs font-mono mt-2'>UPI: ${upi}</p>` : 
            `<p class='text-blue-400 font-black text-3xl'>$29 USD</p><div class='bg-gray-800 p-4 rounded-2xl border border-blue-500/30 text-left font-mono text-[10px] break-all'>USDT Address (TRC20):<br>${usdt}</div>`;
        document.getElementById('pay-content').innerHTML = content;
    }
    setupPayment();

    document.getElementById('activate').onclick = function() {
        voiceActive = true; this.style.display = 'none';
        document.getElementById('status-log').innerText = "● AI CORE ACTIVE: Scanning Global Liquidity...";
        
        setInterval(() => {
            let s = 60 - new Date().getSeconds();
            if(s == 60) s = 0;
            document.getElementById('timer').innerText = (s < 10 ? '0' : '') + s;

            if(trialSecs > 0) {
                trialSecs--;
                let m = Math.floor(trialSecs/60); let rs = trialSecs%60;
                document.getElementById('trial-clock').innerText = `TRIAL: ${m}:${(rs < 10 ? '0' : '') + rs}`;
            } else { document.getElementById('vip-lock').style.display = 'flex'; }

            if(s === 2) {
                const rsi = Math.floor(Math.random() * 60) + 20;
                const ema = Math.random() > 0.5;
                const box = document.getElementById('signal-text');
                const res = document.getElementById('reasoning');
                
                let sig = "WAIT ⚠️";
                let msg = "Consolidation Zone. No clear direction.";
                let clr = "bg-gray-800 text-gray-500 border-gray-700";

                if (ema && rsi > 52 && rsi < 70) {
                    sig = "CALL ⬆ NEXT"; msg = "Bullish Trend + RSI Momentum"; clr = "bg-green-600/20 text-green-400 border-green-500";
                } else if (!ema && rsi < 48 && rsi > 30) {
                    sig = "PUT ⬇ NEXT"; msg = "Bearish Pressure + Support Break"; clr = "bg-red-600/20 text-red-400 border-red-500";
                } else if (rsi < 28) {
                    sig = "CALL ⬆ NEXT"; msg = "Market Oversold - Reversal Entry"; clr = "bg-green-600/20 text-green-400 border-green-500";
                } else if (rsi > 72) {
                    sig = "PUT ⬇ NEXT"; msg = "Market Overbought - Resistance Entry"; clr = "bg-red-600/20 text-red-400 border-red-500";
                }

                box.innerText = sig;
                box.className = `py-5 rounded-2xl text-2xl font-black tracking-widest uppercase transition-all border ${clr}`;
                res.innerText = `REASON: ${msg}`;

                if(voiceActive && !sig.includes("WAIT")) {
                    synth.cancel();
                    let u = new SpeechSynthesisUtterance(sig.includes("CALL") ? "Next candle Call" : "Next candle Put");
                    u.rate = 1.0; synth.speak(u);
                }
            }
        }, 1000);
    };
</script>
</body>
</html>
