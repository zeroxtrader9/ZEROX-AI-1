<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEROX QUANTUM | ALL-MARKET ENGINE (REVERSED)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; }
        .neon-text { text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
        #page-2 { display: none; }
        select { background: #111; border: 1px solid #333; color: #00f2ff; font-size: 10px; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<nav class="bg-black border-b border-gray-900 px-6 py-4 flex justify-between items-center z-50 relative">
    <div class="flex items-center gap-4">
        <select id="market-select" onchange="changeMarket()">
            <option value="FX:EURUSD">EUR/USD (Forex)</option>
            <option value="BINANCE:BTCUSDT">BTC/USDT (Crypto)</option>
            <option value="PYTH:ETHUSD">ETH/USD (24/7)</option>
            <option value="FX:GBPUSD">GBP/USD (Forex)</option>
        </select>
    </div>
    <h1 class="text-lg font-black italic tracking-tighter neon-text uppercase">ZEROX <span class="text-cyan-500">QUANTUM</span></h1>
    <button onclick="location.reload()" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-full uppercase">Refresh</button>
</nav>

<div id="page-1" class="h-screen flex flex-col items-center justify-center p-6 text-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-cyan-900/10 via-black to-black">
    <h2 class="text-4xl font-black mb-4 italic uppercase">12-Level <br><span class="text-cyan-500">Neural Engine</span></h2>
    <p class="text-gray-500 text-[10px] tracking-[0.3em] mb-10 font-bold uppercase">Multi-Market Institutional Analysis</p>
    <button onclick="startApp()" class="bg-cyan-500 text-black font-black px-12 py-5 rounded-3xl text-xs uppercase shadow-2xl shadow-cyan-500/40 hover:scale-105 transition-all">Start Trading System</button>
</div>

<div id="page-2" class="h-screen flex flex-col p-4 bg-black">
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4 pb-24">
        
        <div class="lg:col-span-1 glass rounded-[40px] p-6 flex flex-col gap-5 border-cyan-500/10 shadow-2xl">
            <div class="text-center">
                <div id="clock" class="text-7xl font-black font-mono tracking-tighter">00</div>
                <p id="session-info" class="text-[9px] text-cyan-500 font-bold uppercase mt-2 tracking-widest">Scanning...</p>
            </div>

            <div class="space-y-3 bg-black/50 p-5 rounded-3xl border border-gray-800 text-[9px]">
                <div class="flex justify-between"><span class="text-gray-500 uppercase">Liquidity:</span> <span id="liq" class="text-gray-400 font-bold uppercase italic">Scanning</span></div>
                <div class="flex justify-between"><span class="text-gray-500 uppercase">Wick Reject:</span> <span id="wick" class="text-gray-400 font-bold">Scanning</span></div>
                <div class="flex justify-between border-t border-gray-800 pt-2 font-black"><span class="text-cyan-500">CONFIDENCE:</span> <span id="score" class="text-white font-bold">0/10</span></div>
            </div>

            <div id="signal-box" class="flex-1 flex flex-col justify-center items-center rounded-[35px] bg-zinc-900 border border-gray-800 text-center transition-all duration-500">
                <span class="text-[8px] text-gray-500 uppercase font-black mb-2">Next Candle</span>
                <div id="signal-text" class="text-3xl font-black uppercase text-gray-700">Waiting</div>
            </div>
        </div>

        <div class="lg:col-span-3 rounded-[40px] overflow-hidden border border-gray-800 relative bg-[#131722] shadow-2xl">
            <div id="tv-chart" class="h-full w-full"></div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let widget = null;

    function startApp() {
        document.getElementById('page-1').style.display = 'none';
        document.getElementById('page-2').style.display = 'flex';
        changeMarket();
    }

    function changeMarket() {
        const symbol = document.getElementById('market-select').value;
        widget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "container_id": "tv-chart",
            "style": "1",
            "timezone": "Asia/Kolkata"
        });
    }

    function runAlgorithm() {
        const now = new Date();
        const day = now.getUTCDay(); 
        const hour = now.getUTCHours();
        const symbol = document.getElementById('market-select').value;

        let box = document.getElementById('signal-box');
        let text = document.getElementById('signal-text');
        let sessionTag = document.getElementById('session-info');

        if ((day === 0 || day === 6) && symbol.includes("FX:")) {
            sessionTag.innerText = "WEEKEND - NO TRADE";
            sessionTag.style.color = "#ff3b3b";
            text.innerText = "NEXT CANDLE";
            box.className = "flex-1 flex flex-col justify-center items-center rounded-[35px] bg-red-900/10 border border-red-900/50 text-red-700";
            return;
        }

        let session = "Asian Session (No Trade)";
        if(hour >= 8 && hour <= 12) session = "London Open";
        if(hour >= 13 && hour <= 16) session = "London-NY Overlap";
        if(hour >= 17 && hour <= 20) session = "New York Open";
        sessionTag.innerText = session;
        sessionTag.style.color = "#00f2ff";

        let score = Math.floor(Math.random() * 5) + 5; 
        document.getElementById('score').innerText = score + "/10";
        document.getElementById('liq').innerText = "Sweep OK ✅";
        document.getElementById('wick').innerText = "Rejection Found";

        if(score >= 6) {
            let originalRes = Math.random() > 0.5 ? "CALL" : "PUT";
            
            // --- LOGIC REVERSED YAHAN HUA HAI ---
            // Agar asli result CALL tha, toh ab PUT dikhayega. Agar PUT tha, toh CALL dikhayega.
            let res = (originalRes === "CALL") ? "PUT" : "CALL";
            
            text.innerText = res;
            if(res === "CALL") {
                box.className = "flex-1 flex flex-col justify-center items-center rounded-[35px] bg-cyan-500/10 border border-cyan-500 text-cyan-400";
                text.className = "text-5xl font-black uppercase neon-text";
            } else {
                box.className = "flex-1 flex flex-col justify-center items-center rounded-[35px] bg-red-500/10 border border-red-500 text-red-500";
                text.className = "text-5xl font-black uppercase";
            }
        } else {
            text.innerText = "NEXT CANDLE";
            text.className = "text-2xl font-black text-gray-700";
            box.className = "flex-1 flex flex-col justify-center items-center rounded-[35px] bg-zinc-900 border border-gray-800";
        }
    }

    setInterval(() => {
        let s = 60 - new Date().getSeconds();
        document.getElementById('clock').innerText = s < 10 ? '0'+s : s;
        if(s === 2) runAlgorithm(); 
        if(s === 59) {
            document.getElementById('signal-text').innerText = "Waiting...";
            document.getElementById('signal-box').className = "flex-1 flex flex-col justify-center items-center rounded-[35px] bg-zinc-900 border border-gray-800";
        }
    }, 1000);
</script>
</body>
</html>
